version: "3.8"

services:
  shield-backend:
    build:
      context: ./shield-backend
      dockerfile: Dockerfile
    container_name: shield-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /var/log/suricata/eve.json:/var/log/suricata/eve.json:ro
      - ./data:/data
      - ./config:/app/config:ro
      - ./logs:/logs
    ports:
      - "8088:8088"
    mem_limit: 512m
    cpus: 1.0
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - shield-net

  shield-frontend:
    build:
      context: ./shield-frontend
      dockerfile: Dockerfile
    container_name: shield-frontend
    restart: unless-stopped
    ports:
      - "3500:80"
    depends_on:
      shield-backend:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - shield-net

  # Optional reverse proxy — enable with: docker compose --profile proxy up
  reverse-proxy:
    image: nginx:alpine
    container_name: shield-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - shield-backend
      - shield-frontend
    mem_limit: 128m
    cpus: 0.5
    profiles:
      - proxy
    networks:
      - shield-net

networks:
  shield-net:
    driver: bridge
