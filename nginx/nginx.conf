# Optional reverse proxy — unifies frontend + backend on port 80
# Enable with: docker compose --profile proxy up

server {
    listen 80;
    server_name localhost;

    # Frontend SPA
    location / {
        proxy_pass http://shield-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend API
    location /api/ {
        proxy_pass http://shield-backend:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health
    location /health {
        proxy_pass http://shield-backend:8088/health;
    }
}
