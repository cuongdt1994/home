# AI Shield — Aggregation Thresholds
# This file is hot-reloaded every 5 seconds.

windows:
  default_seconds: 300

rules:
  ssh_bruteforce:
    match_event_types: ["alert"]
    match_categories: ["Attempted Administrator Privilege Gain"]
    min_count: 10
    window_seconds: 300

  port_scan:
    match_event_types: ["alert"]
    match_categories: ["Network Trojan was detected", "Attempted Information Leak"]
    min_unique_ports: 20
    window_seconds: 300

  critical_suricata:
    match_severity: 1   # Suricata severity 1 = critical
    min_count: 3
    window_seconds: 300

  web_attack:
    match_event_types: ["alert"]
    match_categories: ["Web Application Attack"]
    min_count: 5
    window_seconds: 300

  # Default fallback for unmatched alert types
  default:
    min_count: 15
    window_seconds: 300
